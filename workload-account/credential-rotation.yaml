AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Scheduled enforcement of IAM access key rotation: a Lambda function runs
  on a schedule and deactivates any IAM user access key older than the
  configured maximum age. Deploy in a member/workload account. Requires
  CAPABILITY_NAMED_IAM.

Parameters:
  pMaxKeyAgeDays:
    Type: Number
    Default: 90
    MinValue: 1
    Description: Maximum age, in days, an IAM access key may remain Active before this automation deactivates it.

  pScheduleExpression:
    Type: String
    Default: rate(1 day)
    Description: EventBridge schedule expression controlling how often the check runs.

  pNotificationEmail:
    Type: String
    Default: ""
    Description: >-
      Optional email address to notify when a key is deactivated. Leave
      blank to skip the subscription - you can subscribe an endpoint to
      the SNS topic later regardless.

Conditions:
  HasNotificationEmail: !Not [!Equals [!Ref pNotificationEmail, ""]]

Resources:
  RotationNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: iam-key-rotation-notifications

  RotationNotificationSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasNotificationEmail
    Properties:
      TopicArn: !Ref RotationNotificationTopic
      Protocol: email
      Endpoint: !Ref pNotificationEmail

  RotationLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: IamKeyRotationLambdaRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: RotateAccessKeys
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: InspectAndDeactivateKeys
                Effect: Allow
                Action:
                  - iam:ListUsers
                  - iam:ListAccessKeys
                  - iam:UpdateAccessKey
                Resource: "*"
              - Sid: PublishNotification
                Effect: Allow
                Action: sns:Publish
                Resource: !Ref RotationNotificationTopic

  RotationLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: iam-key-rotation-enforcer
      Description: Deactivates IAM user access keys older than pMaxKeyAgeDays.
      Runtime: python3.12
      Handler: index.handler
      Timeout: 60
      Role: !GetAtt RotationLambdaExecutionRole.Arn
      Environment:
        Variables:
          MAX_KEY_AGE_DAYS: !Ref pMaxKeyAgeDays
          SNS_TOPIC_ARN: !Ref RotationNotificationTopic
      Code:
        ZipFile: |
          import os
          from datetime import datetime, timezone

          import boto3

          iam = boto3.client('iam')
          sns = boto3.client('sns')

          MAX_AGE_DAYS = int(os.environ.get('MAX_KEY_AGE_DAYS', '90'))
          TOPIC_ARN = os.environ.get('SNS_TOPIC_ARN', '')


          def handler(event, context):
              deactivated = []
              paginator = iam.get_paginator('list_users')
              for page in paginator.paginate():
                  for user in page['Users']:
                      username = user['UserName']
                      keys = iam.list_access_keys(UserName=username)['AccessKeyMetadata']
                      for key in keys:
                          if key['Status'] != 'Active':
                              continue
                          age_days = (datetime.now(timezone.utc) - key['CreateDate']).days
                          if age_days >= MAX_AGE_DAYS:
                              iam.update_access_key(
                                  UserName=username,
                                  AccessKeyId=key['AccessKeyId'],
                                  Status='Inactive',
                              )
                              deactivated.append(
                                  f"{username}/{key['AccessKeyId']} (age {age_days}d)"
                              )

              if deactivated and TOPIC_ARN:
                  sns.publish(
                      TopicArn=TOPIC_ARN,
                      Subject='IAM access keys deactivated for rotation',
                      Message=(
                          'The following access keys exceeded the maximum age '
                          'and were deactivated:\n\n' + '\n'.join(deactivated)
                      ),
                  )

              return {'deactivated': deactivated}

  RotationSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: iam-key-rotation-schedule
      ScheduleExpression: !Ref pScheduleExpression
      State: ENABLED
      Targets:
        - Arn: !GetAtt RotationLambdaFunction.Arn
          Id: RotationLambdaTarget

  RotationScheduleInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RotationLambdaFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt RotationSchedule.Arn

Outputs:
  NotificationTopicArn:
    Value: !Ref RotationNotificationTopic
  LambdaFunctionArn:
    Value: !GetAtt RotationLambdaFunction.Arn
